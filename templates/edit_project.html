{% extends "base.html" %}

{% block title %}Edit Project — AI Adoption Assistant{% endblock %}

{% block content %}
<div class="page-header">
    <div>
        <h1 class="page-title">Edit Project</h1>
        <p class="page-subtitle">Update the details for "{{ project['name'] }}".</p>
    </div>
    <a href="{{ url_for('dashboard') }}" class="btn btn-secondary">← Back</a>
</div>

<div class="form-container">
    <form method="POST" action="{{ url_for('edit_project', project_id=project['id']) }}">

        <div class="form-group">
            <label for="name">Project Name <span class="required">*</span></label>
            <input type="text" id="name" name="name" class="form-input"
                   value="{{ project['name'] }}" required>
        </div>

        <div class="form-group">
            <label for="description">Description</label>
            <textarea id="description" name="description" class="form-input form-textarea">{{ project['description'] or '' }}</textarea>
        </div>

        <div class="form-row">
            <div class="form-group">
                <label for="owner">Project Owner</label>
                <input type="text" id="owner" name="owner" class="form-input"
                       value="{{ project['owner'] or '' }}">
            </div>

            <div class="form-group">
                <label for="status">Status</label>
                <select id="status" name="status" class="form-input form-select">
                    {% for s in ['Planning', 'In Progress', 'Completed', 'On Hold'] %}
                        <option value="{{ s }}" {% if project['status'] == s %}selected{% endif %}>{{ s }}</option>
                    {% endfor %}
                </select>
            </div>
        </div>

        <div class="form-group">
            <label for="milestone">Latest Milestone</label>
            <input type="text" id="milestone" name="milestone" class="form-input"
                   value="{{ project['milestone'] or '' }}">
        </div>

        <div class="form-actions">
            <a href="{{ url_for('dashboard') }}" class="btn btn-secondary">Cancel</a>
            <button type="submit" class="btn btn-primary">Save Changes</button>
        </div>

    </form>
</div>
{% endblock %}
